version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: soleguard
      POSTGRES_USER: sole
      POSTGRES_PASSWORD: sole
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"

  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
    volumes:
      - miniodata:/data

  backend:
    build: ./backend
    depends_on: [db, mosquitto, minio]
    environment:
      DATABASE_URL: postgresql://sole:sole@db:5432/soleguard
      MQTT_HOST: mosquitto
      S3_ENDPOINT: http://minio:9000
      S3_KEY: minio
      S3_SECRET: minio123
    ports:
      - "8000:8000"

volumes:
  pgdata:
  miniodata: