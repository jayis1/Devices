version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowguard
      POSTGRES_USER: flowguard
      POSTGRES_PASSWORD: ${DB_PASSWORD:-flowguard_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -t health -m ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://flowguard:${DB_PASSWORD:-flowguard_dev}@postgres:5432/flowguard
      - MQTT_BROKER=mosquitto
      - JWT_SECRET=${JWT_SECRET:-dev_secret_change_in_production}
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000/ws
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  mosquitto_data: