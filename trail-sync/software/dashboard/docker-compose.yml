version: "3.8"
services:
  dashboard:
    build: ./backend
    ports:
      - "8023:8023"
    environment:
      - DATABASE_URL=sqlite:///trailsync.db
    volumes:
      - dashboard_data:/app/data
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

volumes:
  dashboard_data: