version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://urbanharvest:urbanharvest@postgres:5432/urbanharvest
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      - postgres
      - mosquitto
      - minio
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=urbanharvest
      - POSTGRES_USER=urbanharvest
      - POSTGRES_PASSWORD=urbanharvest
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=urbanharvest
      - MINIO_ROOT_PASSWORD=urbanharvest123
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

volumes:
  pgdata:
  miniodata: