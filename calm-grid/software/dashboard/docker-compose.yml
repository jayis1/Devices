version: "3.8"

services:
  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: calm
      POSTGRES_PASSWORD: calm
      POSTGRES_DB: calmgrid
    ports:
      - "5432:5432"
    volumes:
      - calm-db:/var/lib/postgresql/data

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://calm:***@db:5432/calmgrid
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
    depends_on:
      - db
      - mosquitto

volumes:
  calm-db: