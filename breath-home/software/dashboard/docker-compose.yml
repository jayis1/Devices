version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://breathhome:breathhome@db:5432/breathhome
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_USERNAME=breathhome
      - MQTT_PASSWORD=breathhome
    depends_on:
      - db
      - mosquitto
    restart: unless-stopped

  db:
    image: timescale/timescaledb:latest-pg15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=breathhome
      - POSTGRES_PASSWORD=breathhome
      - POSTGRES_DB=breathhome
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped

  ml-worker:
    build:
      context: .
      dockerfile: Dockerfile.ml
    environment:
      - DATABASE_URL=postgresql://breathhome:breathhome@db:5432/breathhome
      - MQTT_BROKER=mosquitto
    depends_on:
      - db
      - mosquitto
    restart: unless-stopped

volumes:
  pgdata:
  mosquitto_data: