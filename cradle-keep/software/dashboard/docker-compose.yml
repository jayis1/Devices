version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cradlekeep
      POSTGRES_USER: cradlekeep
      POSTGRES_PASSWORD: cradlekeep
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://cradlekeep:cradlekeep@postgres/cradlekeep
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
    depends_on:
      - postgres
      - mosquitto
    restart: unless-stopped

volumes:
  postgres_data: