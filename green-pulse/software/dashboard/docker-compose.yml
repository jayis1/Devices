version: "3.9"

services:
  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: greenpulse
      POSTGRES_USER: green
      POSTGRES_PASSWORD: gp_secret_change_me
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://green:***@db:5432/greenpulse
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
    depends_on:
      - db
      - mosquitto
    ports:
      - "8000:8000"

volumes:
  pgdata: